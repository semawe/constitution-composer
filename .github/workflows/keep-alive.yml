name: Supabase keep-alive

# Le plan Free de Supabase met en pause les projets sans activité base
# pendant plus de 7 jours. Ce cron ping la base une fois par jour pour
# maintenir l'activité (auth + données comptes/versions/Déclarations vivent
# dans Supabase). Voir CLAUDE.md § Supabase.

on:
  schedule:
    - cron: '17 6 * * *' # tous les jours à 06:17 UTC
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST (compte une requête côté Postgres)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          code=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/profiles?select=id&limit=1")
          echo "HTTP $code"
          # 200 (ok) comme 401/403 (RLS) prouvent que la requête a atteint Postgres.
          if [ "$code" = "000" ]; then
            echo "Aucune réponse — base injoignable" >&2
            exit 1
          fi
